name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums
        run: |
          curl -sL "https://github.com/DungNguyen0209/aibodyguard/releases/download/${{ github.ref_name }}/checksums.txt" \
            -o checksums.txt
          cat checksums.txt

      - name: Extract SHA256s
        id: sha
        run: |
          echo "darwin_arm64=$(grep 'darwin-arm64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "darwin_amd64=$(grep 'darwin-amd64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(grep 'linux-arm64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(grep 'linux-amd64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: DungNguyen0209/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
          DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          DARWIN_AMD64: ${{ steps.sha.outputs.darwin_amd64 }}
          LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
          LINUX_AMD64: ${{ steps.sha.outputs.linux_amd64 }}
        run: |
          VERSION_NUM="${VERSION#v}"
          sed -i "s|version \".*\"|version \"${VERSION_NUM}\"|" homebrew-tap/Formula/aibodyguard.rb
          sed -i "/darwin-arm64/{n;s|sha256 \".*\"|sha256 \"${DARWIN_ARM64}\"|}"\
            homebrew-tap/Formula/aibodyguard.rb
          sed -i "/darwin-amd64/{n;s|sha256 \".*\"|sha256 \"${DARWIN_AMD64}\"|}"\
            homebrew-tap/Formula/aibodyguard.rb
          sed -i "/linux-arm64/{n;s|sha256 \".*\"|sha256 \"${LINUX_ARM64}\"|}"\
            homebrew-tap/Formula/aibodyguard.rb
          sed -i "/linux-amd64/{n;s|sha256 \".*\"|sha256 \"${LINUX_AMD64}\"|}"\
            homebrew-tap/Formula/aibodyguard.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aibodyguard.rb
          git commit -m "aibodyguard ${{ github.ref_name }}"
          git push

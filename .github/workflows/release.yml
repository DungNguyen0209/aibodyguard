name: Release

on:
  push:
    branches:
      - main
      - 'beta/*'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_beta: ${{ steps.version.outputs.is_beta }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          BASE=$(grep 'Version = ' cmd/aibodyguard/version.go | sed 's/.*= "\(.*\)"/\1/')
          if [[ "${{ github.ref_name }}" == beta/* ]]; then
            echo "version=v${BASE}-beta.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "is_beta=true" >> $GITHUB_OUTPUT
          else
            echo "version=v${BASE}" >> $GITHUB_OUTPUT
            echo "is_beta=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build \
            -ldflags="-s -w -X main.Version=${{ needs.version.outputs.version }}" \
            -o aibodyguard-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} \
            ./cmd/aibodyguard/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aibodyguard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: aibodyguard-*

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum aibodyguard-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          prerelease: ${{ needs.version.outputs.is_beta }}
          files: |
            aibodyguard-*
            checksums.txt
          generate_release_notes: true

  update-tap:
    needs: [version, release]
    runs-on: ubuntu-latest
    # Only update the Homebrew tap for stable releases
    if: needs.version.outputs.is_beta == 'false'

    steps:
      - name: Download checksums
        run: |
          curl -sL "https://github.com/DungNguyen0209/aibodyguard/releases/download/${{ needs.version.outputs.version }}/checksums.txt" \
            -o checksums.txt
          cat checksums.txt

      - name: Extract SHA256s
        id: sha
        run: |
          echo "darwin_arm64=$(grep 'darwin-arm64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "darwin_amd64=$(grep 'darwin-amd64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(grep 'linux-arm64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(grep 'linux-amd64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: DungNguyen0209/homebrew-tap
          token: ${{ secrets.DUNG_GITHUB_PAT }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ needs.version.outputs.version }}
          DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          DARWIN_AMD64: ${{ steps.sha.outputs.darwin_amd64 }}
          LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
          LINUX_AMD64: ${{ steps.sha.outputs.linux_amd64 }}
        run: |
          VERSION_NUM="${VERSION#v}"
          sed -i "s|version \".*\"|version \"${VERSION_NUM}\"|" homebrew-tap/Formula/aibodyguard.rb
          sed -i "/darwin-arm64/{n;s|sha256 \".*\"|sha256 \"${DARWIN_ARM64}\"|}"\
            homebrew-tap/Formula/aibodyguard.rb
          sed -i "/darwin-amd64/{n;s|sha256 \".*\"|sha256 \"${DARWIN_AMD64}\"|}"\
            homebrew-tap/Formula/aibodyguard.rb
          sed -i "/linux-arm64/{n;s|sha256 \".*\"|sha256 \"${LINUX_ARM64}\"|}"\
            homebrew-tap/Formula/aibodyguard.rb
          sed -i "/linux-amd64/{n;s|sha256 \".*\"|sha256 \"${LINUX_AMD64}\"|}"\
            homebrew-tap/Formula/aibodyguard.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aibodyguard.rb
          git commit -m "aibodyguard ${{ needs.version.outputs.version }}"
          git push

  update-scoop:
    needs: [version, release]
    runs-on: ubuntu-latest
    # Only update the Scoop bucket for stable releases
    if: needs.version.outputs.is_beta == 'false'

    steps:
      - name: Download checksums
        run: |
          curl -sL "https://github.com/DungNguyen0209/aibodyguard/releases/download/${{ needs.version.outputs.version }}/checksums.txt" \
            -o checksums.txt

      - name: Extract windows SHA256
        id: sha
        run: |
          echo "windows_amd64=$(grep 'windows-amd64.exe$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout scoop bucket
        uses: actions/checkout@v4
        with:
          repository: DungNguyen0209/scoop-bucket
          token: ${{ secrets.DUNG_GITHUB_PAT }}
          path: scoop-bucket

      - name: Update manifest
        env:
          VERSION: ${{ needs.version.outputs.version }}
          WINDOWS_AMD64: ${{ steps.sha.outputs.windows_amd64 }}
        run: |
          VERSION_NUM="${VERSION#v}"
          jq \
            --arg ver "$VERSION_NUM" \
            --arg url "https://github.com/DungNguyen0209/aibodyguard/releases/download/${VERSION}/aibodyguard-windows-amd64.exe" \
            --arg hash "$WINDOWS_AMD64" \
            '.version = $ver | .architecture["64bit"].url = $url | .architecture["64bit"].hash = $hash' \
            scoop-bucket/bucket/aibodyguard.json > tmp.json
          mv tmp.json scoop-bucket/bucket/aibodyguard.json

      - name: Commit and push
        working-directory: scoop-bucket
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/aibodyguard.json
          git commit -m "aibodyguard ${{ needs.version.outputs.version }}"
          git push
